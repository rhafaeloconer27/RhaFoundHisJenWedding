<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <meta name="theme-color" content="#8c997d" />

  <title>Home | Rhaf &amp; Jen</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Allura&family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/style.css" />
  <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
/>
</head>

<body data-current-page="home">

  <main class="page-container">

    <section class="wedding-hero">

      <div
        class="hero-slideshow"
        aria-hidden="true"
      >
        <div class="hero-slide active">
          <img
            src="images/rhafjenone.webp"
            alt=""
          />
        </div>

        <div class="hero-slide">
          <img
            src="images/rhafjentwo.webp"
            alt=""
          />
        </div>

        <div class="hero-slide">
          <img
            src="images/rhafjenthree.webp"
            alt=""
          />
        </div>

        <div class="hero-slide">
          <img
            src="images/rhafjenfour.webp"
            alt=""
          />
        </div>

        <div class="hero-slide">
          <img
            src="images/rhafjenfive.webp"
            alt=""
          />
        </div>

        <div class="hero-slide">
          <img
            src="images/rhafjensix.webp"
            alt=""
          />
        </div>

        <div class="hero-slide">
          <img
            src="images/rhafjenseven.webp"
            alt=""
          />
        </div>
      </div>

      <div class="hero-overlay"></div>

      <div class="hero-content">
        <h1 class="couple-name">
          <span>Rhaf</span>

          <span class="ampersand">
            &amp;
          </span>

          <span>Jen</span>
        </h1>

        <p class="wedding-date">
          FEBRUARY 4, 2027
        </p>
      </div>

      <div
  class="hero-countdown"
  aria-label="Wedding countdown"
>
  <div class="countdown-item">
    <div class="countdown-line">
      <strong
        id="days"
        class="countdown-number"
      >
        000
      </strong>
    </div>

    <span class="countdown-label">
      DAYS
    </span>
  </div>

  <div class="countdown-item">
    <div class="countdown-line">
      <strong
        id="hours"
        class="countdown-number"
      >
        00
      </strong>
    </div>

    <span class="countdown-label">
      HOURS
    </span>
  </div>

  <div class="countdown-item">
    <div class="countdown-line">
      <strong
        id="minutes"
        class="countdown-number"
      >
        00
      </strong>
    </div>

    <span class="countdown-label">
      MINUTES
    </span>
  </div>

  <div class="countdown-item">
    <div class="countdown-line">
      <strong
        id="seconds"
        class="countdown-number"
      >
        00
      </strong>
    </div>

    <span class="countdown-label">
      SECONDS
    </span>
  </div>
</div>

    </section>

  </main>

  <!-- Global navigation -->
  <div id="globalNavigation"></div>

  <!-- Global navigation -->
  <script src="js/common.js"></script>

  <!-- Global music -->
  <script src="js/music.js"></script>

  <!-- Home-only slideshow and countdown -->
  <script src="js/home.js"></script>

</body>
</html>
