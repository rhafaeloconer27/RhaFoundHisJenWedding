<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#8c997d" />

  <title>Home | Rhaf &amp; Jen</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Allura&family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="home-page" data-current-page="home">
  <main class="page-container">
    <section class="home-hero">
      <div class="hero-overlay"></div>

      <div class="hero-content">
        <h1 class="hero-names">
          Rhaf
          <span>&amp;</span>
          Jen
        </h1>

        <div class="decorative-dots">•••••••••••••••</div>
        <p class="wedding-date">FEBRUARY 4, 2027</p>
      </div>
    </section>

    <section class="countdown-section">
      <div class="countdown">
        <div class="countdown-item">
          <strong id="days">000</strong>
          <span>DAYS</span>
        </div>

        <div class="countdown-item">
          <strong id="hours">00</strong>
          <span>HOURS</span>
        </div>

        <div class="countdown-item">
          <strong id="minutes">00</strong>
          <span>MINUTES</span>
        </div>

        <div class="countdown-item">
          <strong id="seconds">00</strong>
          <span>SECONDS</span>
        </div>
      </div>

      <p class="countdown-message" id="countdownMessage"></p>
    </section>

    <section class="home-actions">
      <p class="navigation-instruction">
        Please tap an icon below to view more details.
      </p>

      <div class="primary-actions">
        <a class="primary-button" href="rsvp.html">RSVP HERE</a>
        <a class="primary-button" href="prenup.html">PRENUP</a>
      </div>
    </section>
  </main>

  <nav class="bottom-navigation" aria-label="Wedding navigation">
    <a class="nav-item" data-page="home" href="home.html">
      <span class="nav-icon">⌂</span>
      <span class="nav-label">Home</span>
    </a>

    <a class="nav-item" data-page="sponsors" href="sponsors.html">
      <span class="nav-icon">♔</span>
      <span class="nav-label">Sponsors</span>
    </a>

    <a class="nav-item" data-page="location" href="location.html">
      <span class="nav-icon">⌖</span>
      <span class="nav-label">Location</span>
    </a>

    <a class="nav-item" data-page="attire" href="attire.html">
      <span class="nav-icon">♙</span>
      <span class="nav-label">Attire</span>
    </a>

    <a class="nav-item" data-page="gift" href="gift-guide.html">
      <span class="nav-icon">♡</span>
      <span class="nav-label">Gift</span>
    </a>

    <a class="nav-item" data-page="faq" href="faq.html">
      <span class="nav-icon">?</span>
      <span class="nav-label">FAQ</span>
    </a>

    <a class="nav-item" data-page="contact" href="contact.html">
      <span class="nav-icon">✆</span>
      <span class="nav-label">Contact</span>
    </a>
  </nav>

  <audio id="bgMusic" loop preload="metadata">
    <source src="music/goodnessofGod.mp3" type="audio/mpeg" />
    Your browser does not support audio playback.
  </audio>

  <button
    id="musicButton"
    type="button"
    aria-label="Play background music"
  >
    🔇
  </button>

  <script src="js/common.js"></script>
  <script src="js/countdown.js"></script>
</body>
</html>
