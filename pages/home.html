<main class="page-container">

  <section class="wedding-hero">

    <!-- HOME BACKGROUND SLIDESHOW -->

    <div
      class="hero-slideshow"
      aria-hidden="true"
    >
       <div class="hero-slide active">
    <img
      src="images/rhafjenone.webp"
      alt=""
      loading="eager"
      fetchpriority="high"
      decoding="async"
    />
  </div>

  <!--
    REMAINING IMAGES:
    Load with lower priority because they are not yet visible.
  -->
  <div class="hero-slide">
    <img
      src="images/rhafjentwo.webp"
      alt=""
      loading="lazy"
      decoding="async"
    />
  </div>

  <div class="hero-slide">
    <img
      src="images/rhafjenthree.webp"
      alt=""
      loading="lazy"
      decoding="async"
    />
  </div>

  <div class="hero-slide">
    <img
      src="images/rhafjenfour.webp"
      alt=""
      loading="lazy"
      decoding="async"
    />
  </div>

  <div class="hero-slide">
    <img
      src="images/rhafjenfive.webp"
      alt=""
      loading="lazy"
      decoding="async"
    />
  </div>

  <div class="hero-slide">
    <img
      src="images/rhafjensix.webp"
      alt=""
      loading="lazy"
      decoding="async"
    />
  </div>

  <div class="hero-slide">
    <img
      src="images/rhafjenseven.webp"
      alt=""
      loading="lazy"
      decoding="async"
    />
  </div>
</div>

    <!-- DARK OVERLAY -->

    <div class="hero-overlay"></div>

    <!-- COUPLE NAME AND DATE -->

    <div class="hero-content">

      <h1 class="couple-name">
        <span>Rhaf</span>

        <span class="ampersand">
          &amp;
        </span>

        <span>Jen</span>
      </h1>

      <p class="wedding-date">
        FEBRUARY 4, 2027
      </p>

    </div>

    <!-- WEDDING COUNTDOWN -->

    <div
      class="hero-countdown"
      aria-label="Wedding countdown"
    >

      <!-- DAYS -->

      <div class="countdown-item">

        <div class="countdown-line">
          <strong
            id="days"
            class="countdown-number"
          >
            000
          </strong>
        </div>

        <span class="countdown-label">
          DAYS
        </span>

      </div>

      <!-- HOURS -->

      <div class="countdown-item">

        <div class="countdown-line">
          <strong
            id="hours"
            class="countdown-number"
          >
            00
          </strong>
        </div>

        <span class="countdown-label">
          HOURS
        </span>

      </div>

      <!-- MINUTES -->

      <div class="countdown-item">

        <div class="countdown-line">
          <strong
            id="minutes"
            class="countdown-number"
          >
            00
          </strong>
        </div>

        <span class="countdown-label">
          MINUTES
        </span>

      </div>

      <!-- SECONDS -->

      <div class="countdown-item">

        <div class="countdown-line">
          <strong
            id="seconds"
            class="countdown-number"
          >
            00
          </strong>
        </div>

        <span class="countdown-label">
          SECONDS
        </span>

      </div>

    </div>

  </section>

</main>
