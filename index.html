<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <meta
    name="theme-color"
    content="#8c997d"
  />

  <title>Rhaf &amp; Jen | Wedding Invitation</title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Allura&family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="css/style.css"
  />
</head>

<body class="invitation-intro-body">

  <!-- Loading screen -->

  <div
    class="wedding-loader"
    id="weddingLoader"
  >
    <div class="wedding-loader-content">

      <div class="loader-rings">
        <span class="loader-ring loader-ring-left"></span>
        <span class="loader-ring loader-ring-right"></span>
      </div>

      <h1 class="loader-names">
        Rhaf
        <span>&amp;</span>
        Jen
      </h1>

      <p class="loader-message">
        Preparing your invitation
      </p>

      <div class="loader-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>

    </div>
  </div>

  <!-- Main invitation intro -->

  <main
    class="invitation-intro"
    id="invitationIntro"
  >
    <div class="intro-background"></div>
    <div class="intro-overlay"></div>

    <section class="invitation-stage">

      <p class="intro-label">
        Together with their families
      </p>

      <div
        class="invitation-cover"
        id="invitationCover"
      >
        <!-- Revealed photo/card -->

        <div class="invitation-reveal">
          <div class="reveal-photo"></div>

          <div class="reveal-content">

    <p class="reveal-small">
        Together with their families
    </p>

    <div class="reveal-divider">
        ✦
    </div>

    <h1>
        Rhaf
        <span>&amp;</span>
        Jen
    </h1>

    <p class="reveal-invites">
        request the honour of your presence
        <br>
        at the celebration of their marriage
    </p>

    <div class="reveal-divider">
        ✦
    </div>

    <p class="reveal-date">
        February 4, 2027
    </p>

</div>
        </div>

        <!-- Left panel -->

        <div class="cover-panel cover-panel-left">
          <div class="cover-decoration"></div>
        </div>

        <!-- Right panel -->

        <div class="cover-panel cover-panel-right">
          <div class="cover-decoration"></div>
        </div>

        <!-- Center names -->

        <div class="cover-title">
          <p>Wedding Invitation</p>

          <h2>
            Rhaf
            <span>&amp;</span>
            Jen
          </h2>
        </div>

        <!-- Wax seal -->

        <button
          class="gsap-wax-seal"
          id="openInvitationButton"
          type="button"
          aria-label="Open wedding invitation"
        >
          <span>R</span>
          <small>&amp;</small>
          <span>J</span>
        </button>
      </div>

    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="js/index-animation.js"></script>
</body>
</html>
