<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <meta
    name="theme-color"
    content="#8c997d"
  />

  <title>RhaFoundHisJen</title>

  <link
    rel="icon"
    type="image/webp"
    href="images/rhafjenLogo.webp"
  />

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Allura&family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
  />

  <link
    rel="preload"
    as="image"
    href="images/rhafjenone.webp"
    fetchpriority="high"
  />

  <!-- Lottie Player -->
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

  <!-- Critical loader CSS -->
  <style>
  html,
  body {
    margin: 0;
    width: 100%;
    min-height: 100%;
    background: #8c997d;
  }

  body.spa-initializing {
    overflow: hidden;
  }

  body.spa-initializing #app,
  body.spa-initializing #globalNavigation,
  body.spa-initializing #musicButton,
  body.spa-initializing .music-button {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .page-transition-loader {
    position: fixed;
    inset: 0;
    z-index: 999999;

    display: flex;
    align-items: center;
    justify-content: center;

    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .page-transition-loader.is-visible {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
  }

  .page-transition-loader-content {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #pageLoaderAnimation {
    display: block;
    width: 240px;
    height: 240px;
  }
</style>

  <link
    rel="stylesheet"
    href="css/style.css"
  />
</head>

<body
  data-current-page="home"
  class="spa-initializing"
>

  <!-- Dynamic SPA content -->
  <div
    id="app"
    aria-busy="true"
  ></div>

  <!-- Permanent navigation -->
  <div id="globalNavigation"></div>

  <!-- Single Lottie loader only -->
  <div
    class="page-transition-loader is-visible"
    id="pageTransitionLoader"
    aria-hidden="false"
    aria-label="Loading wedding invitation"
  >
    <div class="page-transition-loader-content">

      <lottie-player
        id="pageLoaderAnimation"
        src="images/Loadingwedding.json"
        background="transparent"
        speed="1"
        loop
        autoplay
      ></lottie-player>

    </div>
  </div>

  <!-- Permanent global scripts -->
  <script src="js/common.js"></script>
  <script src="js/music.js"></script>

  <!-- Page-specific scripts -->
  <script src="js/home.js"></script>
  <script src="js/rsvp.js"></script>

  <!-- SPA script must remain last -->
  <script src="js/app.js"></script>

</body>
</html>
