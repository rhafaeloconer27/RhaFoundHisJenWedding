<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <meta
    name="theme-color"
    content="#8c997d"
  />

  <title>RhaFoundHisJen</title>

  <!-- Browser tab logo -->

  <link
    rel="icon"
    type="image/webp"
    href="images/rhafjenLogo.webp"
  />

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Allura&family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
  />

  <link
  rel="preload"
  as="image"
  href="images/rhafjenone.webp"
  fetchpriority="high"
/>

<style>
html,
body{
    margin:0;
    width:100%;
    height:100%;
    background:#8c997d;
}

body.spa-initializing{
    overflow:hidden;
}

.page-transition-loader{
    position:fixed;
    inset:0;
    z-index:999999;

    display:flex;
    align-items:center;
    justify-content:center;

    background:#8c997d;
}

.page-transition-loader-content{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.loader-rings{
    position:relative;
    width:72px;
    height:46px;
    margin-bottom:22px;
}

.loader-ring{
    position:absolute;
    width:42px;
    height:42px;
    border-radius:50%;
    border:3px solid #d8c08c;
}

.loader-ring-left{
    left:0;
}

.loader-ring-right{
    right:0;
}

.loader-names{
    margin:0;
    color:#fff;
    font-family:cursive;
    font-size:3.5rem;
    line-height:.8;
}

.loader-message{
    color:#fff;
    margin-top:20px;
}

.loader-dots{
    display:flex;
    gap:8px;
    margin-top:18px;
}

.loader-dots span{
    width:8px;
    height:8px;
    border-radius:50%;
    background:white;
}
</style>

  <link
    rel="stylesheet"
    href="css/style.css"
  />
</head>

<body
  data-current-page="home"
  class="spa-initializing"
>

  <!-- =====================================================
       DYNAMIC PAGE CONTENT

       CHANGE:
       No temporary text is displayed here because the
       loader already provides the initial loading state.
  ====================================================== -->

  <div
    id="app"
    aria-busy="true"
  ></div>

  <!-- =====================================================
       PERMANENT NAVIGATION
  ====================================================== -->

  <div id="globalNavigation"></div>

  <!-- =====================================================
       INITIAL AND PAGE TRANSITION LOADER

       CHANGE:
       "is-visible" makes the loader visible immediately.
  ====================================================== -->

  <div
    class="page-transition-loader is-visible"
    id="pageTransitionLoader"
    aria-hidden="false"
    aria-label="Loading wedding invitation"
  >
    <div class="page-transition-loader-content">

      <div
        class="loader-rings"
        aria-hidden="true"
      >
        <span class="loader-ring loader-ring-left"></span>
        <span class="loader-ring loader-ring-right"></span>
      </div>

      <h1 class="loader-names">
        Rhaf
        <span>&amp;</span>
        Jen
      </h1>

      <p
        class="loader-message"
        id="pageLoaderMessage"
      >
        Loading invitation...
      </p>

      <div
        class="loader-dots"
        aria-hidden="true"
      >
        <span></span>
        <span></span>
        <span></span>
      </div>

    </div>
  </div>

  <!-- PERMANENT GLOBAL SCRIPTS -->

  <script src="js/common.js"></script>
  <script src="js/music.js"></script>

  <!-- PAGE-SPECIFIC SCRIPTS -->

  <script src="js/home.js"></script>
  <script src="js/rsvp.js"></script>

  <!-- SPA SCRIPT MUST REMAIN LAST -->

  <script src="js/app.js"></script>

</body>
</html>
